<!DOCTYPE html>
<html>
    <head>
        <title>Laboratory - FSH Lab Scheduler</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="sidebar-nav.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    </head>
    <body>
        <div class="dashboard-container">
            <header class="dash-nav">
                <nav>
                    <a href="dashboard.html"><img src="public/fsh_logo_colored.png"></a>
                    <div class="nav-right">
                        <p id="user-display"></p>
                        <div class="profile-section">
                            <a href="profile.html" class="profile-link" title="Profile">
                                <img src="public/User_Circle.png" alt="Profile">
                            </a>
                            <span class="profile-label">Profile</span>
                        </div>
                    </div>
                </nav>
            </header>

            <div class="lab-header">
                <div class="lab-header-content">
                    <div class="lab-header-left">
                        <h1 id="lab-name">Laboratory</h1>
                        <p id="lab-subtitle">Select a date and time to make a reservation</p>
                    </div>
                    <div class="lab-header-right">
                        <button class="back-btn" onclick="goBackToDashboard()">
                            <i class="fas fa-arrow-left"></i>
                            <span>Back to Dashboard</span>
                        </button>
                    </div>
                </div>
            </div>

            <main class="main-content">
                <!-- Shared Calendar for Both Views -->
                <div class="calendar-container">
                    <div class="calendar-header">
                        <h2 id="calendar-title">Select Date</h2>
                        <div class="calendar-controls" id="user-calendar-controls">
                            <div class="view-toggle">
                                <button class="view-btn active" onclick="showCalendarView('daily')" data-view="daily" title="Daily View">
                                    <i class="fas fa-calendar-day"></i>
                                </button>
                                <button class="view-btn" onclick="showCalendarView('weekly')" data-view="weekly" title="Weekly View">
                                    <i class="fas fa-calendar-week"></i>
                                </button>
                                <button class="view-btn" onclick="showCalendarView('monthly')" data-view="monthly" title="Monthly View">
                                    <i class="fas fa-calendar"></i>
                                </button>
                            </div>
                            <div class="calendar-nav">
                                <button onclick="previousMonth()">
                                    <i class="fas fa-chevron-left"></i>
                                </button>
                                <span id="current-month-year">January 2024</span>
                                <button onclick="nextMonth()">
                                    <i class="fas fa-chevron-right"></i>
                                </button>
                            </div>
                        </div>
                        <div class="calendar-controls" id="admin-calendar-controls" style="display: none;">
                            <div class="calendar-nav">
                                <button onclick="previousMonth()">
                                    <i class="fas fa-chevron-left"></i>
                                </button>
                                <span id="admin-month-year">January 2024</span>
                                <button onclick="nextMonth()">
                                    <i class="fas fa-chevron-right"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="calendar-grid" id="calendar-grid"></div>
                </div>

                <!-- User View (Teachers) -->
                <div id="user-view">
                    <!-- Time Slots -->
                    <div class="time-slots-container">
                        <h3>Select Time Slot</h3>
                        <div class="time-slots-grid" id="time-slots"></div>
                    </div>

                    <!-- Reservation Form -->
                    <div class="reservation-form">
                        <h3>Reservation Details</h3>
                        
                        <div id="selected-info">
                            <p>Please select a date and time slot</p>
                        </div>

                        <form id="reservation-form">
                            <div class="form-group">
                                <label for="teacher-name">Teacher's Name</label>
                                <input type="text" id="teacher-name" required placeholder="Enter your full name">
                            </div>

                            <div class="form-group">
                                <label for="subject">Subject</label>
                                <select id="subject" required>
                                    <option value="">Select subject</option>
                                    <option value="General Biology">General Biology</option>
                                    <option value="Physics">Physics</option>
                                    <option value="Chemistry">Chemistry</option>
                                    <option value="E-Tech">E-Tech</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="grade">Grade Level</label>
                                <select id="grade" required>
                                    <option value="">Select grade level</option>
                                    <option value="11">Grade 11</option>
                                    <option value="12">Grade 12</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="students">Number of Students</label>
                                <input type="number" id="students" required min="1" max="50" placeholder="e.g., 30">
                            </div>

                            <div class="form-group">
                                <label for="purpose">Purpose/Activity</label>
                                <textarea id="purpose" required placeholder="Describe the planned activity or experiment"></textarea>
                            </div>

                            <button type="submit" id="submit-reservation" class="submit-reservation-btn" disabled>
                                <i class="fas fa-paper-plane"></i> Submit Reservation
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Admin View -->
                <div id="admin-view" class="hidden">
                    <!-- Reservations Management -->
                    <div class="admin-panel">
                        <h3>Manage Reservations</h3>
                        <div id="reservations-list" class="reservations-list"></div>
                    </div>
                </div>
            </main>
        </div>

        <script src="api.js"></script>
        <script src="sidebar-nav.js"></script>
        <script src="notifications.js"></script>
        <script src="ui.js"></script>
        <script>
            // Get lab name from URL and update page
            document.addEventListener('DOMContentLoaded', () => {
                const urlParams = new URLSearchParams(window.location.search);
                const labName = urlParams.get('lab') || 'Laboratory';
                
                // Update all lab name displays
                document.getElementById('lab-name').textContent = labName;
            });
        </script>
        <script src="laboratory.js"></script>
    </body>
</html>
