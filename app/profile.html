<!DOCTYPE html>
<html>
    <head>
        <title>Profile - FSH Lab Scheduler</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="sidebar-nav.css">
        <link rel="stylesheet" href="profile-styles.css">
        <meta name="description" content="">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    </head>
    <body>
        <div class="dashboard-container">
            <header class="dash-nav">
                <nav>
                    <a href="dashboard.html"><img src="../public/fsh_logo_colored.png"></a>
                    <div class="nav-right">
                        <p id="user-display"></p>
                        <div class="profile-section">
                            <a href="profile.html" class="profile-link" title="Profile">
                                <svg class="nav-icon user-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%" fill="none"><circle cx="50" cy="38" r="16" stroke="currentColor" stroke-width="6"/><path d="M14,82 C14,62 86,62 86,82" stroke="currentColor" stroke-width="6" stroke-linecap="round"/></svg>
                            </a>
                            <span class="profile-label">Profile</span>
                        </div>
                    </div>
                </nav>
            </header>

            <div class="profile-header">
                <div class="profile-header-content">
                    <div class="profile-header-left">
                        <h1>Profile Settings</h1>
                    </div>
                    <div class="profile-header-right">
                        <button class="back-btn" onclick="goBackToDashboard()">
                            <i class="fas fa-arrow-left"></i>
                            <span>Back to Dashboard</span>
                        </button>
                    </div>
                </div>
            </div>

            <main class="main-content">
                <div class="profile-container">
                    <!-- Profile Information Card -->
                    <div class="profile-card">
                        <div class="profile-icon">
                            <i class="fas fa-user-circle"></i>
                        </div>
                        <div class="profile-info">
                            <h2 id="profile-name">Loading...</h2>
                            <p id="profile-email">Loading...</p>
                            <span class="profile-role-badge" id="profile-role">Loading...</span>
                        </div>
                    </div>

                    <!-- Change Password Card -->
                    <div class="settings-card">
                        <h3><i class="fas fa-lock"></i> Security</h3>
                        <p class="card-description">Update your password to keep your account secure</p>
                        
                        <button class="change-password-btn" onclick="showChangePassword()">
                            <i class="fas fa-key"></i>
                            Change Password
                        </button>
                    </div>

                    <!-- Logout Card -->
                    <div class="settings-card">
                        <h3><i class="fas fa-sign-out-alt"></i> Account</h3>
                        <p class="card-description">Sign out of your account</p>
                        
                        <button class="logout-btn" onclick="logout()">
                            <i class="fas fa-sign-out-alt"></i>
                            Logout
                        </button>
                    </div>
                </div>
            </main>
        </div>

        <!-- Change Password Modal -->
        <div id="change-password-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Change Password</h2>
                    <button class="modal-close" onclick="closeChangePassword()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                
                <form id="change-password-form" class="modal-form">
                    <div class="form-group">
                        <label for="current-password">Current Password</label>
                        <div class="password-container">
                            <input type="password" id="current-password" class="login-input" placeholder="Enter current password" required>
                            <i class="far fa-eye password-toggle" onclick="togglePassword('current-password', this)" style="display: none;"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="new-password">New Password</label>
                        <div class="password-container">
                            <input type="password" id="new-password" class="login-input" placeholder="Enter new password" required>
                            <i class="far fa-eye password-toggle" onclick="togglePassword('new-password', this)" style="display: none;"></i>
                        </div>
                        <small style="color: #707475; margin-top: 5px; display: block;">Minimum 6 characters</small>
                    </div>

                    <div class="form-group">
                        <label for="confirm-new-password">Confirm New Password</label>
                        <div class="password-container">
                            <input type="password" id="confirm-new-password" class="login-input" placeholder="Confirm new password" required>
                            <i class="far fa-eye password-toggle" onclick="togglePassword('confirm-new-password', this)" style="display: none;"></i>
                        </div>
                    </div>

                    <div class="modal-actions">
                        <button type="button" class="cancel-btn" onclick="closeChangePassword()">Cancel</button>
                        <button type="submit" class="submit-btn">Update Password</button>
                    </div>
                </form>
            </div>
        </div>

        <script src="sidebar-nav.js"></script>
        <script src="push-manager.js"></script>
        <script src="notifications.js"></script>
        <script src="ui.js"></script>
        <script src="profile.js"></script>
    </body>
</html>
