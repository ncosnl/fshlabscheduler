<!DOCTYPE html>
<html>
    <head>
        <title>Dashboard</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="sidebar-nav.css">
        <meta name="description" content="">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <link rel="stylesheet" href="transitions.css">
    </head>
    <body>
    <script src="transitions.js"></script>
        <div class="dashboard-container">
            <header class="dash-nav">
                <nav>
                    <img src="../public/fsh_logo_colored.png" style="cursor: default;">
                    <div class="nav-right">
                        <p id="user-display"></p>
                        <div class="profile-section">
                            <a href="profile.html" class="profile-link" title="Profile">
                                <svg class="nav-icon user-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%" fill="none"><circle cx="50" cy="36" r="20" stroke="currentColor" stroke-width="7.5"/><path d="M10,84 C10,63 90,63 90,84" stroke="currentColor" stroke-width="7.5" stroke-linecap="round"/></svg>
                            </a>
                            <span class="profile-label">Profile</span>
                        </div>
                    </div>
                </nav>
            </header>

            <main class="main-content">
                <header>
                    <h1 id="welcome-title">Dashboard</h1>
                </header>

                <div class="lab-grid">
                    <div class="lab-card" onclick="fshNavigate('laboratory.html?lab=Computer Laboratory 1')">
                        <img src="../public/Computer_Laboratory.jpg" alt="Computer Laboratory 1" class="lab-image">
                        <div class="lab-info">
                            <span>First floor</span>
                            <h3>Computer Laboratory 1</h3>
                        </div>
                    </div>
                    <div class="lab-card" onclick="fshNavigate('laboratory.html?lab=Computer Laboratory 2')">
                        <img src="../public/Computer_Laboratory.jpg" alt="Computer Laboratory 2" class="lab-image">
                        <div class="lab-info">
                            <span>First floor</span>
                            <h3>Computer Laboratory 2</h3>
                        </div>
                    </div>
                    <div class="lab-card" onclick="fshNavigate('laboratory.html?lab=General Science Laboratory')">
                        <img src="../public/General_Science_Laboratory.jpg" alt="General Science Laboratory" class="lab-image">
                        <div class="lab-info">
                            <span>Third floor</span>
                            <h3>General Science Laboratory</h3>
                        </div>
                    </div>
                    <div class="lab-card" onclick="fshNavigate('laboratory.html?lab=Physics Laboratory')">
                        <img src="../public/Physics_Laboratory.jpg" alt="Physics Laboratory" class="lab-image">
                        <div class="lab-info">
                            <span>Third floor</span>
                            <h3>Physics Laboratory</h3>
                        </div>
                    </div>
                    <div class="lab-card" onclick="fshNavigate('laboratory.html?lab=Biology Laboratory')">
                        <img src="../public/Biology_Laboratory.png" alt="Biology Laboratory" class="lab-image">
                        <div class="lab-info">
                            <span>Second floor</span>
                            <h3>Biology Laboratory</h3>
                        </div>
                    </div>                   
                </div>
            </main>
        </div>
        
        <script src="sidebar-nav.js"></script>
        <script src="push-manager.js"></script>
        <script src="notifications.js"></script>
        <script src="ui.js"></script>
        <script src="session-timeout.js"></script>
    </body>
</html>
